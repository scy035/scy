<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="个人作品集 - 全栈工程师">
<title>张三 | 全栈工程师</title>

<!-- 防止暗黑模式闪烁：在页面渲染前设置 dark 类 -->
<script>
(function(){
  var m = localStorage.getItem('pf_dark_mode');
  if (m === 'true' || (m === null && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
    document.documentElement.classList.add('dark');
  }
})();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   重置 & 基础样式
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 80px; }
body {
  font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.7;
  transition: background 0.3s ease, color 0.3s ease;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
ul, ol { list-style: none; }
button { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }
h1, h2, h3, h4 { line-height: 1.3; font-weight: 700; }
::selection { background: var(--accent); color: #fff; }

/* ============================================================
   CSS 自定义属性 — 主题变量
   ============================================================ */
:root {
  --bg-primary:       #ffffff;
  --bg-secondary:     #f8fafc;
  --bg-tertiary:      #f1f5f9;
  --text-primary:     #0f172a;
  --text-secondary:   #475569;
  --text-muted:       #94a3b8;
  --accent:           #6366f1;
  --accent-hover:     #4f46e5;
  --accent-light:     #eef2ff;
  --accent-glow:      rgba(99,102,241,0.15);
  --border:           #e2e8f0;
  --border-light:     #f1f5f9;
  --shadow-sm:        0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:        0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg:        0 12px 40px rgba(0,0,0,0.08);
  --shadow-xl:        0 24px 64px rgba(0,0,0,0.12);
  --radius-sm:        6px;
  --radius-md:        12px;
  --radius-lg:        20px;
  --radius-full:      9999px;
  --transition-fast:  150ms ease;
  --transition-base:  300ms cubic-bezier(0.4,0,0.2,1);
  --transition-slow:  500ms cubic-bezier(0.4,0,0.2,1);
  --navbar-height:    72px;
  --max-width:        1200px;
  --font-mono:        'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --gradient-hero:    linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --gradient-accent:  linear-gradient(135deg, var(--accent) 0%, #a855f7 100%);
}

/* 暗黑模式变量覆盖 */
html.dark {
  --bg-primary:       #0b1121;
  --bg-secondary:     #111827;
  --bg-tertiary:      #1e293b;
  --text-primary:     #f1f5f9;
  --text-secondary:   #94a3b8;
  --text-muted:       #64748b;
  --accent:           #818cf8;
  --accent-hover:     #6366f1;
  --accent-light:     #1e1b4b;
  --accent-glow:      rgba(129,140,248,0.2);
  --border:           #1e293b;
  --border-light:     #1a2332;
  --shadow-sm:        0 1px 2px rgba(0,0,0,0.2);
  --shadow-md:        0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg:        0 12px 40px rgba(0,0,0,0.4);
  --shadow-xl:        0 24px 64px rgba(0,0,0,0.5);
}

/* ============================================================
   工具类
   ============================================================ */
.container { max-width: var(--max-width); margin: 0 auto; padding: 0 24px; }
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
.section { padding: 100px 0; }
.section-label {
  display: inline-block;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 12px;
}
.section-title {
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.section-desc {
  font-size: 1.05rem;
  color: var(--text-secondary);
  max-width: 560px;
  margin-bottom: 48px;
}

/* 按钮样式 */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; border-radius: var(--radius-full);
  font-weight: 600; font-size: 0.95rem;
  transition: all var(--transition-fast);
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent); color: #fff;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
.btn-outline {
  border: 2px solid var(--border); color: var(--text-primary);
}
.btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
.btn-ghost {
  color: var(--text-secondary); padding: 8px 16px;
}
.btn-ghost:hover { color: var(--accent); background: var(--accent-light); }

.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: var(--radius-full);
  font-size: 0.78rem;
  font-weight: 500;
  background: var(--accent-light);
  color: var(--accent);
}
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-weight: 500;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-family: var(--font-mono);
}

/* ============================================================
   导航栏
   ============================================================ */
#navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--navbar-height);
  background: var(--bg-primary);
  border-bottom: 1px solid transparent;
  transition: all var(--transition-base);
}
#navbar.scrolled {
  border-bottom-color: var(--border);
  box-shadow: var(--shadow-sm);
  background: var(--bg-primary);
  backdrop-filter: blur(12px);
}
/* 暗黑模式下导航栏半透明 */
html.dark #navbar.scrolled { background: rgba(11,17,33,0.92); }
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 100%; max-width: var(--max-width); margin: 0 auto; padding: 0 24px;
}
.nav-logo {
  font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em;
  background: var(--gradient-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 4px; }
.nav-links a {
  padding: 8px 16px; border-radius: var(--radius-full);
  font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);
  transition: all var(--transition-fast);
}
.nav-links a:hover, .nav-links a:focus-visible { color: var(--accent); background: var(--accent-light); }
.nav-actions { display: flex; align-items: center; gap: 12px; }
/* 主题切换按钮 */
.theme-toggle {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-full); font-size: 1.2rem;
  transition: all var(--transition-fast);
}
.theme-toggle:hover { background: var(--bg-tertiary); transform: rotate(15deg); }
/* 移动端汉堡菜单 */
.hamburger { display: none; flex-direction: column; gap: 5px; padding: 8px; }
.hamburger span {
  width: 22px; height: 2px; background: var(--text-primary);
  border-radius: 2px; transition: all var(--transition-fast);
}

/* ============================================================
   首屏 / Hero
   ============================================================ */
#hero {
  min-height: 100vh; display: flex; align-items: center;
  padding-top: var(--navbar-height);
  position: relative; overflow: hidden;
}
/* 背景装饰光晕 */
#hero::before {
  content: ''; position: absolute; top: -50%; right: -20%;
  width: 600px; height: 600px; border-radius: 50%;
  background: var(--accent-glow); filter: blur(120px); opacity: 0.5;
  pointer-events: none;
}
#hero::after {
  content: ''; position: absolute; bottom: -30%; left: -10%;
  width: 400px; height: 400px; border-radius: 50%;
  background: rgba(168,85,247,0.12); filter: blur(100px); opacity: 0.4;
  pointer-events: none;
}
.hero-inner {
  display: flex; align-items: center; gap: 64px; position: relative; z-index: 1;
}
.hero-avatar-wrap { flex-shrink: 0; }
.hero-avatar {
  width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
  border: 4px solid var(--border); box-shadow: var(--shadow-lg);
  transition: transform var(--transition-base);
}
.hero-avatar:hover { transform: scale(1.05); }
/* 无头像时的占位符 */
.hero-avatar-placeholder {
  width: 160px; height: 160px; border-radius: 50%;
  background: var(--gradient-accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem; color: #fff; font-weight: 800;
}
.hero-content { max-width: 600px; }
.hero-greeting { font-size: 1rem; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.hero-name { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
.hero-title { font-size: 1.25rem; color: var(--text-secondary); margin-bottom: 16px; font-weight: 500; }
.hero-bio { font-size: 1.05rem; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.8; }
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
/* 社交链接图标 */
.social-links { display: flex; gap: 12px; }
.social-link {
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md); background: var(--bg-secondary);
  font-size: 1.2rem; transition: all var(--transition-fast);
  border: 1px solid var(--border);
}
.social-link:hover { background: var(--accent-light); border-color: var(--accent); transform: translateY(-3px); color: var(--accent); }

/* ============================================================
   关于 & 技能
   ============================================================ */
#about { background: var(--bg-secondary); }
.about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
.about-text { font-size: 1.05rem; color: var(--text-secondary); line-height: 1.9; }
.skills-wrap { display: flex; flex-direction: column; gap: 24px; }
.skill-category-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 12px; }
.skill-item { margin-bottom: 14px; }
.skill-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.88rem; }
.skill-name { font-weight: 600; }
.skill-level { color: var(--text-muted); }
.skill-bar {
  height: 8px; background: var(--bg-tertiary); border-radius: var(--radius-full);
  overflow: hidden;
}
.skill-fill {
  height: 100%; border-radius: var(--radius-full);
  background: var(--gradient-accent);
  width: 0; transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}

/* ============================================================
   简历 / 时间线
   ============================================================ */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 2px; background: var(--border);
}
.timeline-section-title {
  font-size: 1.3rem; font-weight: 700; margin: 36px 0 20px;
  display: flex; align-items: center; gap: 10px;
}
.timeline-section-title:first-child { margin-top: 0; }
.timeline-item {
  position: relative; margin-bottom: 28px;
  padding: 24px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  transition: all var(--transition-fast);
}
.timeline-item:hover { box-shadow: var(--shadow-md); transform: translateX(4px); }
.timeline-item::before {
  content: ''; position: absolute; left: -28px; top: 28px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent); border: 3px solid var(--bg-primary);
  box-shadow: 0 0 0 3px var(--accent);
}
.timeline-header { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.timeline-role { font-size: 1.05rem; font-weight: 700; }
.timeline-org { color: var(--accent); font-weight: 600; }
.timeline-date { font-size: 0.85rem; color: var(--text-muted); font-family: var(--font-mono); }
.timeline-desc { color: var(--text-secondary); font-size: 0.92rem; margin-top: 8px; }
.timeline-highlights { margin-top: 10px; padding-left: 18px; }
.timeline-highlights li { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 4px; position: relative; }
.timeline-highlights li::before { content: '▸'; position: absolute; left: -16px; color: var(--accent); font-size: 0.7rem; top: 2px; }
/* 在职标记 */
.timeline-current {
  display: inline-block; padding: 2px 10px; border-radius: var(--radius-full);
  font-size: 0.72rem; font-weight: 600; background: #dcfce7; color: #16a34a;
}
html.dark .timeline-current { background: #14532d; color: #4ade80; }

/* ============================================================
   作品集
   ============================================================ */
#portfolio { background: var(--bg-secondary); }
/* 分类筛选栏 */
.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px; }
.filter-pill {
  padding: 8px 20px; border-radius: var(--radius-full);
  font-size: 0.88rem; font-weight: 500;
  border: 1.5px solid var(--border); color: var(--text-secondary);
  transition: all var(--transition-fast); background: var(--bg-primary);
}
.filter-pill:hover { border-color: var(--accent); color: var(--accent); }
.filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* 项目卡片网格 */
.project-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 24px;
}
.project-card {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  transition: all var(--transition-base);
  display: flex; flex-direction: column;
}
.project-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
.project-card.hidden { display: none; }
.project-image {
  width: 100%; height: 200px; object-fit: cover;
  background: var(--bg-tertiary);
}
/* 无图片时的占位符 */
.project-image-placeholder {
  width: 100%; height: 200px;
  background: var(--gradient-accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; color: #fff; opacity: 0.8;
}
.project-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.project-category { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.project-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
.project-desc { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 14px; flex: 1; }
.project-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.project-links { display: flex; gap: 12px; }
.project-link {
  padding: 6px 16px; border-radius: var(--radius-full);
  font-size: 0.82rem; font-weight: 600;
  border: 1.5px solid var(--border);
  transition: all var(--transition-fast);
}
.project-link:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
/* 精选标记 */
.featured-badge {
  position: absolute; top: 12px; right: 12px;
  background: var(--accent); color: #fff;
  padding: 4px 12px; border-radius: var(--radius-full);
  font-size: 0.7rem; font-weight: 700;
}
.img-wrap { position: relative; overflow: hidden; }

/* ============================================================
   联系方式
   ============================================================ */
.contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; }
.contact-card {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 24px; background: var(--bg-primary);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  transition: all var(--transition-fast);
  position: relative;
}
.contact-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.contact-icon {
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  background: var(--accent-light); border-radius: var(--radius-md);
  font-size: 1.3rem; flex-shrink: 0;
}
.contact-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 4px; }
.contact-value { font-size: 0.95rem; font-weight: 600; }
/* 复制按钮，默认隐藏，hover 时显示 */
.contact-card .copy-btn {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm); font-size: 0.85rem;
  opacity: 0; transition: opacity var(--transition-fast);
}
.contact-card:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--bg-tertiary); }
/* 可用状态标记 */
.availability-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--radius-full);
  font-size: 0.8rem; font-weight: 600; margin-top: 12px;
}
.availability-badge.on { background: #dcfce7; color: #16a34a; }
html.dark .availability-badge.on { background: #14532d; color: #4ade80; }
.availability-badge.off { background: #fef2f2; color: #dc2626; }
html.dark .availability-badge.off { background: #450a0a; color: #fca5a5; }
.availability-dot { width: 8px; height: 8px; border-radius: 50%; }
.availability-dot.on { background: #16a34a; }
.availability-dot.off { background: #dc2626; }

/* ============================================================
   页脚
   ============================================================ */
#footer {
  padding: 32px 0; text-align: center;
  border-top: 1px solid var(--border);
  font-size: 0.88rem; color: var(--text-muted);
}
#footer .updated { font-size: 0.78rem; margin-top: 6px; }

/* 回到顶部按钮 */
#back-to-top {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 1.3rem;
  box-shadow: var(--shadow-md);
  opacity: 0; transform: translateY(20px); pointer-events: none;
  transition: all var(--transition-base);
  display: flex; align-items: center; justify-content: center;
}
#back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
#back-to-top:hover { background: var(--accent-hover); transform: translateY(-4px); }

/* ============================================================
   加载骨架屏 / 错误提示
   ============================================================ */
.loading-shimmer {
  background: var(--bg-tertiary);
  background-image: linear-gradient(90deg, var(--bg-tertiary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-md);
}
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
.skeleton-line { height: 16px; margin-bottom: 10px; }
.skeleton-line.short { width: 60%; }
.skeleton-card { height: 200px; }

/* 网络错误提示 */
.error-banner {
  text-align: center; padding: 60px 20px; color: var(--text-secondary);
}
.error-banner .retry-btn {
  margin-top: 16px; display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 24px; border-radius: var(--radius-full);
  background: var(--accent); color: #fff; font-weight: 600;
}

/* 空数据状态 */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }

/* 消息提示 Toast */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius-md);
  font-size: 0.85rem; font-weight: 500; color: #fff;
  animation: slideInRight 0.3s ease;
  box-shadow: var(--shadow-lg);
}
.toast.success { background: #16a34a; }
.toast.error { background: #dc2626; }
.toast.info { background: var(--accent); }
@keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ============================================================
   滚动淡入动画
   ============================================================ */
@media (prefers-reduced-motion: no-preference) {
  .fade-in {
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-in.visible { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   打印样式
   ============================================================ */
@media print {
  #navbar, #back-to-top, .theme-toggle, .hamburger, .nav-actions, .social-links, .filter-bar, .hero-actions, .copy-btn { display: none !important; }
  .section { padding: 20px 0; }
  body { font-size: 11pt; color: #000; background: #fff; }
  .project-grid { grid-template-columns: 1fr 1fr; }
}

/* ============================================================
   响应式布局
   ============================================================ */
/* 平板及以下 */
@media (max-width: 1023px) {
  .about-grid { grid-template-columns: 1fr; gap: 40px; }
  .hero-inner { flex-direction: column; text-align: center; gap: 32px; }

<!-- ============================================================
     主脚本
     ============================================================ -->
<script>
// ============================================================
// 模块: 配置常量
// ============================================================
const CONFIG = {
  JSONBIN_BIN_ID: '6a3e38daf5f4...',   // <-- 替换为你的 JSONBin Bin ID
  JSONBIN_API_URL: 'https://api.jsonbin.io/v3/b/',
  CACHE_KEY: 'pf_data_cache',           // 缓存数据存储键
  CACHE_TS_KEY: 'pf_cache_ts',          // 缓存时间戳存储键
  CACHE_TTL_MS: 5 * 60 * 1000,         // 缓存有效期: 5 分钟
  DARK_MODE_KEY: 'pf_dark_mode',        // 暗黑模式存储键
};

// ============================================================
// 模块: 全局状态
// ============================================================
const state = {
  data: null,             // 完整的作品集 JSON 数据
  activeCategory: '全部', // 当前选中的作品分类
};

// ============================================================
// 模块: 工具函数
// ============================================================
/** 快捷选择器 */
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

/** HTML 转义，防止 XSS */
function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/** 格式化日期为中文格式（年-月） */
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('zh-CN', { year:'numeric', month:'long' });
}

/** 格式化日期时间为完整中文格式 */
function formatDateTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ============================================================
// 模块: API 数据获取（JSONBin）
// ============================================================
/** 从 JSONBin 获取最新作品集数据 */
async function fetchPortfolioData() {
  const url = CONFIG.JSONBIN_API_URL + CONFIG.JSONBIN_BIN_ID;
  const resp = await fetch(url, {
    headers: { 'Content-Type': 'application/json' }
  });
  if (!resp.ok) throw new Error(`API 请求失败: ${resp.status}`);
  const json = await resp.json();
  // JSONBin v3 返回格式: { record: {...}, metadata: {...} }
  return json.record || json;
}

/** 从本地缓存读取数据 */
function getCachedData() {
  try {
    const ts = localStorage.getItem(CONFIG.CACHE_TS_KEY);
    const raw = localStorage.getItem(CONFIG.CACHE_KEY);
    if (!ts || !raw) return null;
    // 检查缓存是否过期
    if (Date.now() - parseInt(ts) > CONFIG.CACHE_TTL_MS) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

/** 将数据写入本地缓存 */
function setCachedData(data) {
  try {
    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CONFIG.CACHE_TS_KEY, Date.now().toString());
  } catch { /* localStorage 满 — 静默忽略 */ }
}

// ============================================================
// 模块: 主题切换（暗黑模式）
// ============================================================
/** 初始化主题: 绑定按钮 + 监听系统偏好变化 */
function initTheme() {
  const toggle = $('#theme-toggle');
  if (!toggle) return;
  updateThemeIcon();
  toggle.addEventListener('click', toggleTheme);
  // 监听操作系统主题变化
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
    // 仅当用户未手动设置时跟随系统
    if (localStorage.getItem(CONFIG.DARK_MODE_KEY) === null) {
      document.documentElement.classList.toggle('dark', e.matches);
      updateThemeIcon();
    }
  });
}

/** 切换暗黑模式 */
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem(CONFIG.DARK_MODE_KEY, isDark.toString());
  updateThemeIcon();
}

/** 更新主题按钮图标 */
function updateThemeIcon() {
  const toggle = $('#theme-toggle');
  if (!toggle) return;
  toggle.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

// ============================================================
// 模块: 渲染 — 导航栏
// ============================================================
function renderNavbar(data) {
  const p = data.personal || {};
  $('#nav-name').textContent = p.name || 'Portfolio';
  document.title = `${p.name || 'Portfolio'} | ${p.title || ''}`;
  const metaDesc = $('meta[name="description"]');
  if (metaDesc) metaDesc.setAttribute('content', p.bio || '个人作品集');
}

// ============================================================
// 模块: 渲染 — 首屏
// ============================================================
function renderHero(data) {
  const p = data.personal || {};

  // 头像：优先显示图片，失败则显示姓名首字
  const placeholder = $('#hero-avatar-el');
  const img = $('#hero-avatar-img');
  if (p.avatar) {
    if (placeholder) placeholder.style.display = 'none';
    if (img) {
      img.src = p.avatar;
      img.alt = p.name || '';
      img.style.display = '';
      img.onerror = function() { this.style.display = 'none'; if (placeholder) placeholder.style.display = ''; };
    }
  }

  $('#hero-greeting').textContent = '👋 你好，我是';
  $('#hero-name').textContent = p.name || '未命名';
  $('#hero-title').textContent = p.title || '';
  $('#hero-bio').textContent = p.bio || '';

  // 渲染社交链接图标
  const socialContainer = $('#social-links');
  if (socialContainer && p.socialLinks) {
    const iconMap = {
      github: '🔗', linkedin: '💼', twitter: '🐦', website: '🌐', globe: '🌐',
      email: '📧', wechat: '💬', zhihu: '知', juejin: '掘', bilibili: 'B',
    };
    socialContainer.innerHTML = p.socialLinks.map(s => {
      const icon = s.icon || '🔗';
      const displayIcon = iconMap[icon] || icon;
      return `<a href="${escapeHTML(s.url)}" class="social-link" target="_blank" rel="noopener" title="${escapeHTML(s.platform)}">${displayIcon}</a>`;
    }).join('');
  }
}

// ============================================================
// 模块: 渲染 — 关于我 + 技能
// ============================================================
function renderAbout(data) {
  const p = data.personal || {};
  const r = data.resume || {};

  $('#about-bio').textContent = p.bio || '';
  $('#resume-summary').textContent = r.summary || '';

  // 按类别分组渲染技能条
  const skillsWrap = $('#skills-wrap');
  if (!skillsWrap) return;
  const skills = r.skills || [];
  if (skills.length === 0) {
    skillsWrap.innerHTML = '<p class="empty-state">暂无技能数据</p>';
    return;
  }

  const grouped = {};
  skills.forEach(s => {
    const cat = s.category || '其他';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  });

  skillsWrap.innerHTML = Object.entries(grouped).map(([cat, items]) => `
    <div>
      <h4 class="skill-category-title">${escapeHTML(cat)}</h4>
      ${items.map(s => `
        <div class="skill-item">
          <div class="skill-info">
            <span class="skill-name">${escapeHTML(s.name)}</span>
            <span class="skill-level">${s.level || 0}%</span>
          </div>
          <div class="skill-bar">
            <div class="skill-fill" data-level="${s.level || 0}" style="width:0"></div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ============================================================
// 模块: 渲染 — 简历时间线
// ============================================================
function renderResume(data) {
  const r = data.resume || {};
  const timeline = $('#timeline');
  if (!timeline) return;

  let html = '';

  // 工作经历
  const work = r.workExperience || [];
  html += '<h3 class="timeline-section-title">💼 工作经历</h3>';
  if (work.length === 0) {
    html += '<div class="empty-state"><div class="icon">💼</div><p>暂无工作经历</p></div>';
  } else {
    html += work.map(w => `
      <div class="timeline-item fade-in">
        <div class="timeline-header">
          <div>
            <span class="timeline-role">${escapeHTML(w.role || '')}</span>
            <span class="timeline-org"> @ ${escapeHTML(w.company || '')}</span>
            ${w.current ? '<span class="timeline-current">在职</span>' : ''}
          </div>
          <span class="timeline-date">${formatDate(w.startDate)} — ${w.current ? '至今' : formatDate(w.endDate)}</span>
        </div>
        ${w.description ? `<p class="timeline-desc">${escapeHTML(w.description)}</p>` : ''}
        ${w.highlights && w.highlights.length ? `
          <ul class="timeline-highlights">
            ${w.highlights.map(h => `<li>${escapeHTML(h)}</li>`).join('')}
          </ul>
        ` : ''}
      </div>
    `).join('');
  }

  // 教育背景
  const edu = r.education || [];
  html += '<h3 class="timeline-section-title">🎓 教育背景</h3>';
  if (edu.length === 0) {
    html += '<div class="empty-state"><div class="icon">🎓</div><p>暂无教育信息</p></div>';
  } else {
    html += edu.map(e => `
      <div class="timeline-item fade-in">
        <div class="timeline-header">
          <div>
            <span class="timeline-role">${escapeHTML(e.degree || '')}</span>
            <span class="timeline-org"> @ ${escapeHTML(e.school || '')}</span>
          </div>
          <span class="timeline-date">${formatDate(e.startDate)} — ${formatDate(e.endDate)}</span>
        </div>
        ${e.gpa ? `<p class="timeline-desc">GPA: ${escapeHTML(e.gpa)}</p>` : ''}
      </div>
    `).join('');
  }

  timeline.innerHTML = html;
}

// ============================================================
// 模块: 渲染 — 作品集（分类筛选 + 项目卡片）
// ============================================================
function renderPortfolio(data) {
  const categories = data.portfolioCategories || ['全部'];
  const items = data.portfolioItems || [];

  // 渲染分类筛选按钮
  const filterBar = $('#filter-bar');
  if (filterBar) {
    filterBar.innerHTML = categories.map(c => `
      <button class="filter-pill${c === state.activeCategory ? ' active' : ''}" data-category="${escapeHTML(c)}">${escapeHTML(c)}</button>
    `).join('');
  }

  // 渲染项目卡片
  const grid = $('#project-grid');
  const empty = $('#portfolio-empty');
  if (!grid) return;

  // 按 order 字段排序
  const sortedItems = [...items].sort((a, b) => (a.order ?? 99) - (b.order ?? 99));

  if (sortedItems.length === 0) {
    grid.innerHTML = '';
    if (empty) empty.style.display = '';
    return;
  }
  if (empty) empty.style.display = 'none';

  grid.innerHTML = sortedItems.map(item => `
    <div class="project-card fade-in" data-category="${escapeHTML(item.category || '')}">
      <div class="img-wrap">
        ${item.image
          ? `<img src="${escapeHTML(item.image)}" alt="${escapeHTML(item.title)}" class="project-image" loading="lazy" onerror="this.replaceWith(document.createElement('div'));(this.nextElementSibling||this).style.display='';">`
          : ''}
        <div class="project-image-placeholder" style="${item.image ? '' : ''}">📁</div>
        ${item.featured ? '<span class="featured-badge">⭐ 精选</span>' : ''}
      </div>
      <div class="project-body">
        <span class="project-category">${escapeHTML(item.category || '未分类')}</span>
        <h3 class="project-title">${escapeHTML(item.title)}</h3>
        <p class="project-desc">${escapeHTML(item.description || '')}</p>
        <div class="project-tags">
          ${(item.techStack || []).map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('')}
        </div>
        <div class="project-links">
          ${item.liveUrl ? `<a href="${escapeHTML(item.liveUrl)}" class="project-link" target="_blank" rel="noopener">🔗 预览</a>` : ''}
          ${item.githubUrl ? `<a href="${escapeHTML(item.githubUrl)}" class="project-link" target="_blank" rel="noopener">⌨️ 源码</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  // 应用当前选中的筛选条件
  filterPortfolioItems();
}

/** 根据当前选中的分类显示/隐藏项目卡片 */
function filterPortfolioItems() {
  const cards = $$('.project-card');
  cards.forEach(card => {
    const cat = card.dataset.category;
    if (state.activeCategory === '全部' || cat === state.activeCategory) {
      card.classList.remove('hidden');
    } else {
      card.classList.add('hidden');
    }
  });
}

// ============================================================
// 模块: 渲染 — 联系方式
// ============================================================
function renderContact(data) {
  const c = data.contact || {};
  const grid = $('#contact-grid');
  if (!grid) return;

  const items = [
    { icon: '📧', label: '邮箱', value: c.email, type: 'email' },
    { icon: '📱', label: '电话', value: c.phone, type: 'tel' },
    { icon: '💬', label: '微信', value: c.wechat, type: 'text' },
    { icon: '📍', label: '位置', value: c.location || c.locationEn, type: 'text' },
  ].filter(i => i.value);

  if (items.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无联系方式</p></div>';
    return;
  }

  grid.innerHTML = items.map(item => `
    <div class="contact-card">
      <div class="contact-icon">${item.icon}</div>
      <div>
        <p class="contact-label">${item.label}</p>
        <p class="contact-value">${escapeHTML(item.value)}</p>
      </div>
      <button class="copy-btn" data-copy="${escapeHTML(item.value)}" title="复制">📋</button>
    </div>
  `).join('');

  // 合作状态
  if (c.availableFor) {
    grid.insertAdjacentHTML('beforeend', `
      <div class="contact-card">
        <div class="contact-icon">🟢</div>
        <div>
          <p class="contact-label">状态</p>
          <span class="availability-badge on"><span class="availability-dot on"></span>${escapeHTML(c.availableFor)}</span>
          ${c.responseTime ? `<p style="font-size:0.82rem;color:var(--text-muted);margin-top:6px;">${escapeHTML(c.responseTime)}</p>` : ''}
        </div>
      </div>
    `);
  }
}

// ============================================================
// 模块: 渲染 — 页脚
// ============================================================
function renderFooter(data) {
  const p = data.personal || {};
  const m = data.meta || {};
  $('#footer-copy').textContent = `© ${new Date().getFullYear()} ${p.name || 'Portfolio'}. All Rights Reserved.`;
  if (m.lastUpdated) {
    $('#footer-updated').textContent = `最后更新: ${formatDateTime(m.lastUpdated)}`;
  }
}

// ============================================================
// 模块: 渲染 — 全部（调用所有渲染函数）
// ============================================================
function renderAll(data) {
  state.data = data;
  renderNavbar(data);
  renderHero(data);
  renderAbout(data);
  renderResume(data);
  renderPortfolio(data);
  renderContact(data);
  renderFooter(data);
  initFadeInObserver(); // 重新监听新生成的元素
}

// ============================================================
// 模块: 交互 — 平滑滚动导航
// ============================================================
function initSmoothScroll() {
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth' });
      // 关闭移动端菜单
      $('#nav-links').classList.remove('open');
    });
  });
}

// ============================================================
// 模块: 交互 — 作品分类筛选
// ============================================================
function initCategoryFilter() {
  const bar = $('#filter-bar');
  if (!bar) return;
  bar.addEventListener('click', (e) => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    state.activeCategory = pill.dataset.category;
    // 切换激活样式
    bar.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    filterPortfolioItems();
  });
}

// ============================================================
// 模块: 交互 — 技能条滚动动画（Intersection Observer）
// ============================================================
function initSkillBarObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const fill = entry.target;
        const level = fill.dataset.level || 0;
        fill.style.width = level + '%'; // 动画填充到目标宽度
        observer.unobserve(fill);
      }
    });
  }, { threshold: 0.3 });

  document.querySelectorAll('.skill-fill').forEach(fill => observer.observe(fill));
}

// ============================================================
// 模块: 交互 — 元素淡入动画（滚动到视口时触发）
// ============================================================
function initFadeInObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

// ============================================================
// 模块: 交互 — 图片懒加载
// ============================================================
function initLazyImages() {
  // 浏览器原生支持 loading="lazy" 则跳过
  if ('loading' in HTMLImageElement.prototype) return;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.removeAttribute('data-src');
        }
        observer.unobserve(img);
      }
    });
  });
  document.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
}

// ============================================================
// 模块: 交互 — 回到顶部按钮
// ============================================================
function initBackToTop() {
  const btn = $('#back-to-top');
  if (!btn) return;
  // 滚动超过 500px 显示按钮
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 500);
  });
  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

// ============================================================
// 模块: 交互 — 导航栏滚动缩紧
// ============================================================
function initNavbarShrink() {
  const navbar = $('#navbar');
  if (!navbar) return;
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 50);
  });
}

// ============================================================
// 模块: 交互 — 一键复制到剪贴板
// ============================================================
function initCopyToClipboard() {
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const text = btn.dataset.copy;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板', 'success');
    }).catch(() => {
      showToast('复制失败，请手动复制', 'error');
    });
  });
}

// ============================================================
// 模块: 交互 — 简历下载
// ============================================================
function initResumeDownload() {
  const handler = () => {
    const url = state.data?.personal?.resumePdfUrl;
    if (url) {
      window.open(url, '_blank');
    } else {
      showToast('简历文件暂未上传', 'info');
    }
  };
  $('#hero-resume-btn')?.addEventListener('click', handler);
  $('#nav-resume-download')?.addEventListener('click', handler);
}

// ============================================================
// 模块: 交互 — 移动端汉堡菜单
// ============================================================
function initMobileNav() {
  const hamburger = $('#hamburger');
  const navLinks = $('#nav-links');
  if (!hamburger || !navLinks) return;
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });
  // 点击菜单外部自动关闭
  document.addEventListener('click', (e) => {
    if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
      navLinks.classList.remove('open');
    }
  });
}

// ============================================================
// 模块: 消息提示 Toast
// ============================================================
function showToast(message, type) {
  const container = $('#toast-container');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  // 2.5 秒后自动消失
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(120%)';
    toast.style.transition = 'all 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ============================================================
// 模块: 加载状态 & 错误处理
// ============================================================
/** 显示骨架屏占位 */
function showLoadingSkeleton() {
  const grid = $('#project-grid');
  if (grid && grid.children.length === 0) {
    grid.innerHTML = Array.from({length: 3}, () => `
      <div class="project-card">
        <div class="loading-shimmer skeleton-card"></div>
        <div class="project-body">
          <div class="loading-shimmer skeleton-line" style="width:40%"></div>
          <div class="loading-shimmer skeleton-line"></div>
          <div class="loading-shimmer skeleton-line short"></div>
        </div>
      </div>
    `).join('');
  }
}

/** 显示网络错误提示 */
function showOfflineMessage() {
  const hero = $('#hero');
  if (!hero) return;
  const banner = document.createElement('div');
  banner.className = 'error-banner';
  banner.innerHTML = `
    <p>⚠️ 无法加载数据，请检查网络连接</p>
    <button class="retry-btn" onclick="location.reload()">🔄 重试</button>
  `;
  hero.insertAdjacentElement('afterend', banner);
}

// ============================================================
// 模块: 初始化入口
// ============================================================
async function init() {
  // 初始化各交互模块
  initTheme();
  initSmoothScroll();
  initMobileNav();
  initBackToTop();
  initNavbarShrink();
  initCopyToClipboard();

  // 1. 先尝试用缓存数据即时渲染
  const cached = getCachedData();
  if (cached) {
    renderAll(cached);
    // 延迟触发技能条动画，确保 DOM 渲染完成
    setTimeout(initSkillBarObserver, 100);
    initResumeDownload();
  } else {
    showLoadingSkeleton();
  }

  // 2. 后台向 JSONBin 请求最新数据
  if (CONFIG.JSONBIN_BIN_ID === 'YOUR_BIN_ID_HERE') {
    // 未配置 Bin ID — 使用默认示例数据渲染
    if (!cached) renderAll(getDefaultData());
    initSkillBarObserver();
    initResumeDownload();
    console.warn('⚠️ 请在 index.html 中设置 CONFIG.JSONBIN_BIN_ID 为你的 JSONBin Bin ID');
    return;
  }

  try {
    const fresh = await fetchPortfolioData();
    setCachedData(fresh);
    renderAll(fresh);
    setTimeout(initSkillBarObserver, 100);
    initResumeDownload();
  } catch (err) {
    console.error('获取作品集数据失败:', err);
    if (!cached) {
      // 无缓存可用，降级显示默认数据
      renderAll(getDefaultData());
      initSkillBarObserver();
      initResumeDownload();
      showOfflineMessage();
    }
    // 有缓存：静默继续使用缓存数据
  }
}
